<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="400" height="400">
  <defs>
    <!-- Metallische weiße Panzerung -->
    <linearGradient id="armorGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    
    <!-- Cyanfarbenes Leuchten für Cockpit & Antrieb -->
    <linearGradient id="energyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ccffff"/>
      <stop offset="100%" stop-color="#00ced1"/>
    </linearGradient>
  </defs>

  <!-- Triebwerksfeuer (schmaler und fokussierter) -->
  <path d="M92 165 L108 165 L100 200 Z" fill="url(#energyGrad)" opacity="0.8" />
  <path d="M68 145 L74 142 L71 165 Z" fill="url(#energyGrad)" opacity="0.5" />
  <path d="M132 145 L126 142 L129 165 Z" fill="url(#energyGrad)" opacity="0.5" />

  <!-- Schiffskörper mit schmaler Silhouette und Gabelung -->
  <g stroke="#0f172a" stroke-width="3.5" stroke-linejoin="round" fill="url(#armorGrad)">
    
    <!-- Flügel: Scharfkantig und weit hinten angesetzt -->
    <path d="M85 105 L30 145 L45 160 L75 150 L72 170 L90 160 Z" />
    <path d="M115 105 L170 145 L155 160 L125 150 L128 170 L110 160 Z" />

    <!-- Der Rumpf: Elegant gegabelt und schlank -->
    <!-- Gabel-Spitzen (L: 82,10 | R: 118,10) laufen bei Y=60 zusammen -->
    <path d="M82 10 L94 60 L106 60 L118 10 L125 80 L115 165 L85 165 L75 80 Z" />
  </g>

  <!-- Cockpit (Beginnt exakt am Ende der Gabelung) -->
  <path d="M94 60 L106 60 L112 95 L100 120 L88 95 Z" fill="url(#energyGrad)" stroke="#0f172a" stroke-width="2.5" />
  
  <!-- Lichtreflexion auf dem Cockpit -->
  <path d="M97 65 L103 65 L106 85 L100 105 L94 85 Z" fill="#ffffff" opacity="0.6" />

  <!-- Struktur-Details für den "Icon-Look" -->
  <g stroke="#1e293b" stroke-width="1.5" fill="none" stroke-linecap="round">
    <path d="M88 35 L91 50" />
    <path d="M112 35 L109 50" />
    <path d="M85 130 L115 130" />
  </g>
</svg>

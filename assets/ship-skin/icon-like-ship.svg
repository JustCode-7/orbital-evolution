<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="400" height="400">
  <defs>
    <!-- Glänzendes Weiß für die Panzerung -->
    <linearGradient id="hull" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    
    <!-- Cyan-Leuchten für das Cockpit -->
    <radialGradient id="cockpitGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e0ffff"/>
      <stop offset="100%" stop-color="#00ced1"/>
    </radialGradient>
    
    <!-- Triebwerksstrahl -->
    <linearGradient id="engineFlame" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="20%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Triebwerkseffekte -->
  <path d="M92 165 L108 165 L100 200 Z" fill="url(#engineFlame)" />
  <path d="M65 145 L75 140 L70 170 Z" fill="url(#engineFlame)" opacity="0.7" />
  <path d="M135 145 L125 140 L130 170 Z" fill="url(#engineFlame)" opacity="0.7" />

  <!-- Schatten/Umriss (Icon-Stil) -->
  <g stroke="#0f172a" stroke-width="4" stroke-linejoin="round">
    
    <!-- Die Flügel (jetzt weiter hinten angesetzt) -->
    <path d="M85 90 L30 135 L45 155 L75 145 L70 165 L90 155 Z" fill="url(#hull)" />
    <path d="M115 90 L170 135 L155 155 L125 145 L130 165 L110 155 Z" fill="url(#hull)" />

    <!-- Der lange, schmale Rumpf -->
    <path d="M100 10 L112 80 L115 145 L108 165 L92 165 L85 145 L88 80 Z" fill="url(#hull)" />
  </g>

  <!-- Details & Panel-Lines -->
  <g stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M100 15 L100 65" /> <!-- Spitze -->
    <path d="M90 100 L110 100" /> <!-- Trennung -->
    <!-- Flügel-Details -->
    <path d="M85 110 L50 135" />
    <path d="M115 110 L150 135" />
  </g>

  <!-- Cockpit (Schmal und weit vorne) -->
  <path d="M100 65 L108 90 L100 115 L92 90 Z" fill="url(#cockpitGlow)" stroke="#0f172a" stroke-width="3" />
  
  <!-- Glanzpunkt auf dem Cockpit -->
  <path d="M100 70 L103 85 L100 95 L97 85 Z" fill="#ffffff" opacity="0.8" />

</svg>
